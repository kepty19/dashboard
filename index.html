<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kepty Dashboard - Learning Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --kepty-orange: #CE4A22;
            --kepty-mid-orange: #FAC3B1;
            --kepty-dark: #1e293b; /* モーダル用ダークテキスト */
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at 50% 50%, #FF6B3D 0%, #CE4A22 45%, #2A0B02 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .dashboard-container { max-width: 800px; margin: 0 auto; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
        }
        .chart-container { position: relative; width: 100% !important; height: 220px !important; }
        .text-sharp { letter-spacing: -0.02em; }
        
        .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; opacity: 0.7; white-space: nowrap; }
        .compare-label-accent {
            font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.8);
            border-bottom: 2px solid var(--kepty-orange); 
            padding-bottom: 4px; margin-bottom: 12px; display: inline-block;
        }
        .stat-value { font-size: 1.4rem; font-weight: 700; line-height: 1.1; white-space: nowrap; }
        .stat-unit { font-size: 10px; font-weight: 600; opacity: 0.5; margin-left: 2px; }

        /* ヘルプボタン */
        .help-btn {
            position: absolute; top: 12px; right: 12px;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4); cursor: pointer; transition: 0.2s;
        }
        .help-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

        /* ホワイトベースのモーダル */
        #help-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px;
        }
        .modal-content {
            background: #ffffff; /* ホワイトベース */
            border: 1px solid rgba(206, 74, 34, 0.1);
            border-radius: 24px; padding: 28px; width: 100%; max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            color: var(--kepty-dark); /* ダークテキスト */
        }

        @media (min-width: 768px) {
            .stat-label { font-size: 13px; }
            .compare-label-accent { font-size: 14px; }
            .stat-value { font-size: 2rem; }
            .stat-unit { font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
        <div class="flex flex-col">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-2 h-6 bg-white rounded-full"></div>
                <h2 class="text-lg font-bold tracking-tight">今週の学習時間</h2>
            </div>
            <div class="chart-container flex items-center justify-center">
                <canvas id="circleChart"></canvas>
            </div>
        </div>

        <div class="flex flex-col">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-2 h-6 bg-[#FAC3B1] rounded-full"></div>
                <h2 class="text-lg font-bold tracking-tight text-sharp">現在の進捗</h2>
            </div>
            <div class="flex justify-center gap-6 mb-6 text-sharp">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-bold opacity-60 uppercase mb-1">今週の目標</span>
                    <div class="flex items-baseline">
                        <span class="text-2xl font-bold">03</span><span class="text-xs opacity-60 ml-0.5 mr-1.5">時間</span>
                        <span class="text-2xl font-bold">30</span><span class="text-xs opacity-60 ml-0.5">分</span>
                    </div>
                </div>
                <div class="flex flex-col items-center border-l border-white/10 pl-6">
                    <span class="text-[10px] font-bold opacity-60 uppercase mb-1">今週の総学習時間</span>
                    <div class="flex items-baseline text-white">
                        <span class="text-2xl font-bold">03</span><span class="text-xs opacity-60 ml-0.5 mr-1.5">時間</span>
                        <span class="text-2xl font-bold">19</span><span class="text-xs opacity-60 ml-0.5">分</span>
                    </div>
                </div>
            </div>
            <div class="relative h-[160px] w-full bg-white/5 rounded-2xl p-4">
                <div class="absolute right-3 top-3 text-[10px] font-bold opacity-50">(分)</div>
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>

    <div class="mb-10">
        <div class="flex items-center gap-2 mb-5">
            <div class="w-2 h-6 bg-[#FAC3B1] rounded-full opacity-60"></div>
            <h2 class="text-lg font-bold tracking-tight text-sharp">比較</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-6 flex flex-col items-center justify-center">
                <div onclick="openHelp('savings')" class="help-btn"><i data-lucide="help-circle" class="w-3.5 h-3.5"></i></div>
                <div class="compare-label-accent">進捗貯金</div>
                <div class="flex items-center text-sharp">
                    <i data-lucide="trending-up" class="w-5 h-5 text-emerald-400 mr-2"></i>
                    <span class="text-2xl font-bold text-white">+15</span><span class="stat-unit">分</span>
                </div>
            </div>
            <div class="glass-card p-6 flex flex-col items-center justify-center">
                <div onclick="openHelp('forecast')" class="help-btn"><i data-lucide="help-circle" class="w-3.5 h-3.5"></i></div>
                <div class="compare-label-accent">着地予測</div>
                <div class="flex items-center text-sharp">
                    <i data-lucide="trending-up" class="w-5 h-5 text-emerald-400 mr-2"></i>
                    <span class="text-2xl font-bold text-white">+2</span><span class="stat-unit">時間</span>
                </div>
            </div>
        </div>
    </div>

    <div class="pb-10">
        <div class="flex items-center gap-2 mb-5">
            <div class="w-2 h-6 bg-white/40 rounded-full"></div>
            <h2 class="text-lg font-bold tracking-tight text-white/90 text-sharp">累計</h2>
        </div>
        <div class="grid grid-cols-3 gap-2 md:gap-4">
            <div class="glass-card p-3 md:p-6 flex flex-col items-center justify-center overflow-hidden">
                <div class="flex items-center gap-1.5 mb-4"><i data-lucide="clock" class="w-3 h-3 opacity-70 shrink-0"></i><span class="stat-label">総学習時間</span></div>
                <div class="flex items-baseline text-sharp"><span class="stat-value">300</span><span class="stat-unit">時間</span></div><div class="h-4"></div>
            </div>
            <div class="glass-card p-3 md:p-6 flex flex-col items-center justify-center overflow-hidden">
                <div class="flex items-center gap-1.5 mb-4"><i data-lucide="calendar-check" class="w-3 h-3 opacity-70 shrink-0"></i><span class="stat-label">総学習日数</span></div>
                <div class="flex items-baseline text-sharp"><span class="stat-value">6,129</span><span class="stat-unit">日</span></div><div class="h-4"></div>
            </div>
            <div class="glass-card p-3 md:p-6 flex flex-col items-center justify-center overflow-hidden">
                <div class="flex items-center gap-1.5 mb-4"><i data-lucide="calendar" class="w-3.5 h-3.5 opacity-70 shrink-0"></i><span class="stat-label">連続学習日数</span></div>
                <div class="flex items-baseline text-sharp"><span class="stat-value">445</span><span class="stat-unit">日</span></div><p class="text-[8px] md:text-[10px] font-bold opacity-40 mt-2 whitespace-nowrap text-sharp">自己ベスト:445日</p>
            </div>
        </div>
    </div>
</div>

<div id="help-modal" onclick="closeHelp()">
    <div class="modal-content text-left" onclick="event.stopPropagation()">
        <h3 id="modal-title" class="text-xl font-black text-kepty-orange mb-5 tracking-tighter"></h3>
        <div class="space-y-6">
            <section>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">1. 定義</p>
                <p id="modal-def" class="text-sm font-semibold leading-relaxed text-slate-700"></p>
            </section>
            <section>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">2. 数式</p>
                <div class="bg-slate-50 border border-slate-100 p-3 rounded-xl font-mono text-[11px] text-kepty-orange" id="modal-formula"></div>
            </section>
            <section>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">3. 捉え方</p>
                <div id="modal-interpretation" class="space-y-4"></div>
            </section>
        </div>
        <button onclick="closeHelp()" class="mt-8 w-full py-3.5 bg-kepty-orange text-white font-bold rounded-full text-xs shadow-lg shadow-orange-700/20 active:scale-95 transition">閉じる</button>
    </div>
</div>

<script>
    lucide.createIcons();

    const helpContent = {
        savings: {
            title: "進捗貯金",
            def: "現時点において、1日あたりの目標ペースに対してどれだけリードしているか、または遅れているかを示します。",
            formula: "累計時間 - (週目標 × 経過日数 / 7)",
            interpretation: [
                { type: "plus", label: "プラスの場合", text: "目標ペースを上回っています。このまま「貯金」を維持しましょう！" },
                { type: "minus", label: "マイナスの場合", text: "目標に遅れ（借金）が出ています。今日・明日での巻き返しが必要です。" }
            ]
        },
        forecast: {
            title: "着地予測",
            def: "今週の平均ペースを日曜夜まで継続した場合、最終的に目標を何分超過（または不足）して着地するかを予測します。",
            formula: "(累計時間 / 経過日数 × 7) - 週目標",
            interpretation: [
                { type: "plus", label: "プラスの場合", text: "今のトレンドは非常に順調です。目標達成以上の成果が期待できます！" },
                { type: "minus", label: "マイナスの場合", text: "今のペースだと未達の恐れがあります。今すぐペースアップを検討しましょう。" }
            ]
        }
    };

    function openHelp(key) {
        const data = helpContent[key];
        document.getElementById('modal-title').innerText = data.title;
        document.getElementById('modal-def').innerText = data.def;
        document.getElementById('modal-formula').innerText = data.formula;
        let interpHtml = "";
        data.interpretation.forEach(item => {
            interpHtml += `<div><span class="text-[10px] font-black px-1.5 py-1 rounded ${item.type==='plus'?'bg-emerald-50 text-emerald-600':'bg-rose-50 text-rose-600'}">${item.label}</span><p class="text-xs mt-2 font-medium text-slate-600">${item.text}</p></div>`;
        });
        document.getElementById('modal-interpretation').innerHTML = interpHtml;
        document.getElementById('help-modal').style.display = 'flex';
    }
    function closeHelp() { document.getElementById('help-modal').style.display = 'none'; }

    // Chart.js ロジック (Version 1.1.4準拠)
    const ctxCircle = document.getElementById('circleChart');
    if (ctxCircle) {
        const centerTextPlugin = {
            id: 'centerText',
            afterDraw: (chart) => {
                const { ctx, chartArea } = chart;
                if (!chartArea) return;
                const centerX = (chartArea.left + chartArea.right) / 2;
                const centerY = (chartArea.top + chartArea.bottom) / 2;
                const isMobile = window.innerWidth < 768;
                ctx.save();
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = `700 ${isMobile ? '40px' : '52px'} Inter`;
                ctx.fillStyle = 'white';
                ctx.fillText('03', centerX - (isMobile ? 26 : 34), centerY - 5);
                ctx.fillText('19', centerX + (isMobile ? 28 : 38), centerY - 5);
                ctx.font = `600 ${isMobile ? '12px' : '16px'} Inter`;
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillText('時間', centerX - (isMobile ? 26 : 34), centerY + (isMobile ? 30 : 40));
                ctx.fillText('分', centerX + (isMobile ? 28 : 38), centerY + (isMobile ? 30 : 40));
                ctx.restore();
            }
        };
        new Chart(ctxCircle.getContext('2d'), {
            type: 'doughnut', data: { datasets: [{ data: [75, 25], backgroundColor: ['white', 'rgba(255,255,255,0.1)'], borderWidth: 0, borderRadius: 20, cutout: '90%' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } } },
            plugins: [centerTextPlugin]
        });
    }

    const ctxBar = document.getElementById('barChart');
    if (ctxBar) {
        new Chart(ctxBar.getContext('2d'), {
            type: 'bar', data: { labels: ['月', '火', '水', '木', '金', '土', '日'], datasets: [{ data: [40, 30, 60, 55, 45, 20, 10], backgroundColor: 'white', borderRadius: 10, barThickness: window.innerWidth < 768 ? 8 : 12, order: 1 }, { data: [60, 60, 60, 60, 60, 60, 60], backgroundColor: 'rgba(255, 255, 255, 0.15)', borderRadius: 10, barThickness: window.innerWidth < 768 ? 8 : 12, order: 2, grouped: false }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false, max: 75 }, x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.6)', font: { size: 12, weight: '600' } }, border: { display: false } } }, plugins: { legend: { display: false }, tooltip: { enabled: false } } },
            plugins: [{ id: 'barTopLabel', afterDatasetsDraw: (chart) => { const { ctx, chartArea } = chart; if (!chartArea) return; ctx.save(); ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = 'bold 11px Inter'; const meta = chart.getDatasetMeta(1); meta.data.forEach((bar) => { ctx.fillText('60', bar.x, bar.y - 12); }); ctx.restore(); } }]
        });
    }
</script>

</body>
</html>
