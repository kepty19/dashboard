<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kepty Dashboard - Learning Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --kepty-orange: #CE4A22;
            --kepty-mid-orange: #FAC3B1;
            --kepty-dark: #2A0B02;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at 50% 50%, #FF6B3D 0%, #CE4A22 45%, #2A0B02 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        /* スマホでグラフが消えるのを防ぐための高さ固定 */
        .chart-container {
            position: relative;
            width: 100% !important;
            height: 220px !important; 
        }
        .text-sharp { letter-spacing: -0.02em; }
        
        /* 累計用ラベル（1行限界サイズ） */
        .stat-label { 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.03em; 
            opacity: 0.7; 
            white-space: nowrap; 
        }

        /* 比較用ラベル（アンダーライン付き） */
        .compare-label-accent {
            font-size: 13px; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 4px;
            margin-bottom: 12px;
            display: inline-block;
        }

        .stat-value { font-size: 1.5rem; font-weight: 700; line-height: 1; }
        .stat-unit { font-size: 11px; font-weight: 600; opacity: 0.5; margin-left: 2px; }

        @media (min-width: 768px) {
            .stat-label { font-size: 14px; }
            .compare-label-accent { font-size: 16px; }
            .stat-value { font-size: 2.25rem; }
            .stat-unit { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-12">
        <div class="flex flex-col">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-2 h-6 bg-white rounded-full"></div>
                <h2 class="text-xl font-bold tracking-tight">今週の学習時間</h2>
            </div>
            <div class="chart-container flex items-center justify-center">
                <canvas id="circleChart"></canvas>
            </div>
        </div>

        <div class="flex flex-col">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-2 h-6 bg-[#FAC3B1] rounded-full"></div>
                <h2 class="text-xl font-bold tracking-tight">今週の日次進捗</h2>
            </div>
            
            <div class="flex justify-center gap-10 mb-8 text-sharp">
                <div class="flex flex-col items-center">
                    <span class="stat-label mb-1">今週の目標</span>
                    <div class="flex items-baseline">
                        <span class="text-3xl font-bold">03</span>
                        <span class="text-sm font-medium opacity-60 ml-0.5 mr-2">時間</span>
                        <span class="text-3xl font-bold">30</span>
                        <span class="text-sm font-medium opacity-60 ml-0.5">分</span>
                    </div>
                </div>
                <div class="flex flex-col items-center border-l border-white/10 pl-10">
                    <span class="stat-label mb-1">今週の総学習時間</span>
                    <div class="flex items-baseline text-white">
                        <span class="text-3xl font-bold">03</span>
                        <span class="text-sm font-medium opacity-60 ml-0.5 mr-2">時間</span>
                        <span class="text-3xl font-bold">19</span>
                        <span class="text-sm font-medium opacity-60 ml-0.5">分</span>
                    </div>
                </div>
            </div>

            <div class="relative h-[180px] w-full bg-white/5 rounded-2xl p-4">
                <div class="absolute right-4 top-3 text-[10px] font-bold opacity-50">(分)</div>
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>

    <div class="mb-12">
        <div class="flex items-center gap-2 mb-6">
            <div class="w-2 h-6 bg-[#FAC3B1] rounded-full opacity-60"></div>
            <h2 class="text-xl font-bold tracking-tight">比較</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-8 flex flex-col items-center justify-center">
                <div class="compare-label-accent">対前日</div>
                <div class="flex items-center text-sharp">
                    <i data-lucide="trending-up" class="w-6 h-6 text-emerald-400 mr-2"></i>
                    <span class="text-3xl font-bold text-white">+15</span>
                    <span class="stat-unit">分</span>
                </div>
            </div>
            <div class="glass-card p-8 flex flex-col items-center justify-center">
                <div class="compare-label-accent">対前週</div>
                <div class="flex items-center text-sharp">
                    <i data-lucide="trending-up" class="w-6 h-6 text-emerald-400 mr-2"></i>
                    <span class="text-3xl font-bold text-white">+2</span>
                    <span class="stat-unit">時間</span>
                </div>
            </div>
        </div>
    </div>

    <div class="pb-16">
        <div class="flex items-center gap-2 mb-6">
            <div class="w-2 h-6 bg-white/40 rounded-full"></div>
            <h2 class="text-xl font-bold tracking-tight">累計</h2>
        </div>
        
        <div class="grid grid-cols-3 gap-2 md:gap-6">
            <div class="glass-card p-4 flex flex-col items-center justify-center overflow-hidden">
                <div class="flex items-center gap-1.5 mb-4">
                    <i data-lucide="clock" class="w-3.5 h-3.5 opacity-70"></i>
                    <span class="stat-label">総学習時間</span>
                </div>
                <div class="flex items-baseline text-sharp">
                    <span class="stat-value">300</span>
                    <span class="stat-unit">時間</span>
                </div>
                <div class="h-4"></div>
            </div>

            <div class="glass-card p-4 flex flex-col items-center justify-center overflow-hidden">
                <div class="flex items-center gap-1.5 mb-4">
                    <i data-lucide="calendar-check" class="w-3.5 h-3.5 opacity-70"></i>
                    <span class="stat-label">総学習日数</span>
                </div>
                <div class="flex items-baseline text-sharp">
                    <span class="stat-value">6,129</span>
                    <span class="stat-unit">日</span>
                </div>
                <div class="h-4"></div>
            </div>

            <div class="glass-card p-4 flex flex-col items-center justify-center overflow-hidden">
                <div class="flex items-center gap-1.5 mb-4">
                    <i data-lucide="calendar" class="w-3.5 h-3.5 opacity-70"></i>
                    <span class="stat-label">連続学習日数</span>
                </div>
                <div class="flex items-baseline text-sharp">
                    <span class="stat-value">445</span>
                    <span class="stat-unit">日</span>
                </div>
                <p class="text-[9px] font-bold opacity-40 mt-2 whitespace-nowrap text-center">自己ベスト:445日</p>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    // --- グラフ表示崩れ対策を施した描画処理 ---
    const ctxCircle = document.getElementById('circleChart');
    if (ctxCircle) {
        const centerTextPlugin = {
            id: 'centerText',
            afterDraw: (chart) => {
                const { ctx, chartArea } = chart;
                if (!chartArea) return; // 描画エリアがない場合は何もしない
                
                const { width, height } = chartArea;
                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const centerX = (chartArea.left + chartArea.right) / 2;
                const centerY = (chartArea.top + chartArea.bottom) / 2;
                const isMobile = window.innerWidth < 768;

                ctx.font = `700 ${isMobile ? '40px' : '52px'} Inter`;
                ctx.fillStyle = 'white';
                ctx.fillText('03', centerX - (isMobile ? 26 : 34), centerY - 5);
                ctx.fillText('19', centerX + (isMobile ? 28 : 38), centerY - 5);
                
                ctx.font = `600 ${isMobile ? '12px' : '16px'} Inter`;
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillText('時間', centerX - (isMobile ? 26 : 34), centerY + (isMobile ? 30 : 40));
                ctx.fillText('分', centerX + (isMobile ? 28 : 38), centerY + (isMobile ? 30 : 40));
                ctx.restore();
            }
        };

        new Chart(ctxCircle.getContext('2d'), {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [75, 25],
                    backgroundColor: ['white', 'rgba(255,255,255,0.1)'],
                    borderWidth: 0,
                    borderRadius: 20,
                    cutout: '90%'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } }
            },
            plugins: [centerTextPlugin]
        });
    }

    const ctxBar = document.getElementById('barChart');
    if (ctxBar) {
        new Chart(ctxBar.getContext('2d'), {
            type: 'bar',
            data: {
                labels: ['月', '火', '水', '木', '金', '土', '日'],
                datasets: [
                    {
                        data: [40, 30, 60, 55, 45, 20, 10],
                        backgroundColor: 'white',
                        borderRadius: 10,
                        barThickness: window.innerWidth < 768 ? 8 : 12,
                        order: 1
                    },
                    {
                        data: [60, 60, 60, 60, 60, 60, 60],
                        backgroundColor: 'rgba(255, 255, 255, 0.15)',
                        borderRadius: 10,
                        barThickness: window.innerWidth < 768 ? 8 : 12,
                        order: 2,
                        grouped: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { display: false, max: 75 },
                    x: {
                        grid: { display: false },
                        ticks: { color: 'rgba(255,255,255,0.6)', font: { size: 12, weight: '600' } },
                        border: { display: false }
                    }
                },
                plugins: { legend: { display: false }, tooltip: { enabled: false } }
            },
            plugins: [{
                id: 'barTopLabel',
                afterDatasetsDraw: (chart) => {
                    const { ctx, chartArea } = chart;
                    if (!chartArea) return;
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = 'bold 11px Inter';
                    const meta = chart.getDatasetMeta(1);
                    meta.data.forEach((bar) => {
                        ctx.fillText('60', bar.x, bar.y - 12);
                    });
                    ctx.restore();
                }
            }]
        });
    }
</script>

</body>
</html>
