<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kepty Dashboard - Learning Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --kepty-orange: #CE4A22;
            --kepty-mid-orange: #FAC3B1;
            --kepty-dark: #2A0B02;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at 50% 50%, #FF6B3D 0%, #CE4A22 45%, #2A0B02 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 220px;
        }
        .text-sharp {
            letter-spacing: -0.02em;
        }
        
        /* 累計セクション用ラベル */
        .stat-label { 
            font-size: 10px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.03em; 
            opacity: 0.7; 
            white-space: nowrap; 
        }

        /* 比較セクション用カスタムラベル (大きく、アンダーライン付き) */
        .compare-label-accent {
            font-size: 12px; /* 累計より大きく設定 */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 6px;
            margin-bottom: 14px;
            white-space: nowrap;
        }

        .stat-value { 
            font-size: 1.4rem; 
            font-weight: 700; 
            line-height: 1.1; 
            white-space: nowrap; 
        }
        .stat-unit { 
            font-size: 10px; 
            font-weight: 600; 
            opacity: 0.5; 
            margin-left: 2px; 
        }

        @media (min-width: 768px) {
            .stat-label { font-size: 13px; }
            .compare-label-accent { font-size: 14px; }
            .stat-value { font-size: 2rem; }
            .stat-unit { font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
        <div class="flex flex-col">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-2 h-6 bg-white rounded-full"></div>
                <h2 class="text-lg font-bold tracking-tight">今週の学習時間</h2>
            </div>
            <div class="chart-container flex items-center justify-center">
                <canvas id="circleChart"></canvas>
            </div>
        </div>

        <div class="flex flex-col">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-2 h-6 bg-[#FAC3B1] rounded-full"></div>
                <h2 class="text-lg font-bold tracking-tight text-sharp">今週の日次進捗</h2>
            </div>
            
            <div class="flex justify-center gap-6 mb-6 text-sharp">
                <div class="flex flex-col items-center">
                    <span class="stat-label mb-1">今週の目標</span>
                    <div class="flex items-baseline">
                        <span class="text-2xl font-bold">03</span>
                        <span class="text-xs font-medium opacity-60 ml-0.5 mr-1.5">時間</span>
                        <span class="text-2xl font-bold">30</span>
                        <span class="text-xs font-medium opacity-60 ml-0.5">分</span>
                    </div>
                </div>
                <div class="flex flex-col items-center border-l border-white/10 pl-6">
                    <span class="stat-label mb-1">今週の総学習時間</span>
                    <div class="flex items-baseline text-white">
                        <span class="text-2xl font-bold">03</span>
                        <span class="text-xs font-medium opacity-60 ml-0.5 mr-1.5">時間</span>
                        <span class="text-2xl font-bold">19</span>
                        <span class="text-xs font-medium opacity-60 ml-0.5">分</span>
                    </div>
                </div>
            </div>

            <div class="relative h-[160px] w-full bg-white/5 rounded-2xl p-4">
                <div class="absolute right-3 top-3 text-[10px] font-bold opacity-50">(分)</div>
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>

    <div class="mb-10">
        <div class="flex items-center gap-2 mb-5">
            <div class="w-2 h-6 bg-[#FAC3B1] rounded-full opacity-60"></div>
            <h2 class="text-lg font-bold tracking-tight text-sharp">比較</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-6 flex flex-col items-center justify-center text-center">
                <div class="compare-label-accent">対前日</div>
                <div class="flex items-center text-sharp">
                    <i data-lucide="trending-up" class="w-5 h-5 text-emerald-400 mr-2"></i>
                    <span class="text-2xl font-bold text-white">+15</span>
                    <span class="stat-unit">分</span>
                </div>
            </div>
            <div class="glass-card p-6 flex flex-col items-center justify-center text-center">
                <div class="compare-label-accent">対前週</div>
                <div class="flex items-center text-sharp">
                    <i data-lucide="trending-up" class="w-5 h-5 text-emerald-400 mr-2"></i>
                    <span class="text-2xl font-bold text-white">+2</span>
                    <span class="stat-unit">時間</span>
                </div>
            </div>
        </div>
    </div>

    <div class="pb-10">
        <div class="flex items-center gap-2 mb-5">
            <div class="w-2 h-6 bg-white/40 rounded-full"></div>
            <h2 class="text-lg font-bold tracking-tight text-white/90 text-sharp">累計</h2>
        </div>
        
        <div class="grid grid-cols-3 gap-2 md:gap-4">
            <div class="glass-card p-3 md:p-6 flex flex-col items-center justify-center overflow-hidden text-center">
                <div class="flex items-center gap-1.5 mb-4">
                    <i data-lucide="clock" class="w-3 h-3 opacity-70 shrink-0"></i>
                    <span class="stat-label">総学習時間</span>
                </div>
                <div class="flex items-baseline text-sharp">
                    <span class="stat-value">300</span>
                    <span class="stat-unit">時間</span>
                </div>
                <div class="h-4"></div>
            </div>

            <div class="glass-card p-3 md:p-6 flex flex-col items-center justify-center overflow-hidden text-center">
                <div class="flex items-center gap-1.5 mb-4">
                    <i data-lucide="calendar-check" class="w-3 h-3 opacity-70 shrink-0"></i>
                    <span class="stat-label">総学習日数</span>
                </div>
                <div class="flex items-baseline text-sharp">
                    <span class="stat-value">6,129</span>
                    <span class="stat-unit">日</span>
                </div>
                <div class="h-4"></div>
            </div>

            <div class="glass-card p-3 md:p-6 flex flex-col items-center justify-center overflow-hidden text-center">
                <div class="flex items-center gap-1.5 mb-4">
                    <i data-lucide="calendar" class="w-3 h-3 opacity-70 shrink-0"></i>
                    <span class="stat-label">連続学習日数</span>
                </div>
                <div class="flex items-baseline text-sharp">
                    <span class="stat-value">445</span>
                    <span class="stat-unit">日</span>
                </div>
                <p class="text-[8px] md:text-[10px] font-bold opacity-40 mt-2 whitespace-nowrap">自己ベスト:445日</p>
            </div>
        </div>
    </div>
</div>

<script>

    const ctxCircle = document.getElementById('circleChart').getContext('2d');
    const centerTextPlugin = {
        id: 'centerText',
        afterDraw: (chart) => {
