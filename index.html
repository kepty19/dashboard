<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kepty Dashboard - Learning Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: linear-gradient(180deg, #2D4296 0%, #1E2E6E 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 220px;
        }
        /* スクロールバー非表示 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        
        <div class="relative">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-3 h-3 rounded-full bg-[#5EEAD4]"></div>
                <h2 class="text-lg font-bold">今週の学習時間</h2>
            </div>
            <div class="chart-container flex items-center justify-center">
                <canvas id="circleChart"></canvas>
                </div>
        </div>

        <div>
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-[#60A5FA]"></div>
                    <h2 class="text-lg font-bold">今週の目標</h2>
                </div>
                <button class="bg-white/20 hover:bg-white/30 px-4 py-1 rounded-lg text-sm font-bold transition">変更</button>
            </div>
            
            <div class="flex items-baseline gap-1 mb-2">
                <span class="text-4xl font-black">3</span>
                <span class="text-lg font-bold">時間</span>
                <span class="text-4xl font-black">30</span>
                <span class="text-lg font-bold">分</span>
            </div>

            <div class="h-[180px] w-full">
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="glass-card p-5">
            <div class="flex items-center gap-2 text-slate-300 mb-3">
                <i data-lucide="clock" class="w-5 h-5"></i>
                <span class="text-sm font-bold">総学習時間</span>
            </div>
            <div class="flex items-baseline justify-end gap-1">
                <span class="text-3xl font-black">300</span>
                <span class="text-sm font-bold">時間</span>
            </div>
            <p class="text-[10px] text-slate-400 text-right mt-1">サプリ内：300時間</p>
        </div>

        <div class="glass-card p-5">
            <div class="flex items-center gap-2 text-slate-300 mb-3">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                <span class="text-sm font-bold">総学習回数</span>
            </div>
            <div class="flex items-baseline justify-end gap-1">
                <span class="text-3xl font-black">6129</span>
                <span class="text-sm font-bold">回</span>
            </div>
        </div>

        <div class="glass-card p-5">
            <div class="flex items-center gap-2 text-slate-300 mb-3">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                <span class="text-sm font-bold">連続学習日数</span>
            </div>
            <div class="flex items-baseline justify-end gap-1">
                <span class="text-3xl font-black">445</span>
                <span class="text-sm font-bold">日</span>
            </div>
            <p class="text-[10px] text-slate-400 text-right mt-1">自己ベスト：445日</p>
        </div>
    </div>
</div>

<script>
    // Lucide Icons 初期化
    lucide.createIcons();

    // --- 円形グラフ (Circle Progress) ---
    const ctxCircle = document.getElementById('circleChart').getContext('2d');
    
    // 中央にテキストを表示するカスタムプラグイン
    const centerTextPlugin = {
        id: 'centerText',
        afterDraw: (chart) => {
            const { ctx, chartArea: { top, bottom, left, right, width, height } } = chart;
            ctx.save();
            
            // "03" (時間)
            ctx.font = '900 48px Inter';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.fillText('03', width / 2 - 25, height / 2 + 10);
            
            // "19" (分)
            ctx.font = '900 48px Inter';
            ctx.fillText('19', width / 2 + 35, height / 2 + 10);
            
            // "時間" "分" ラベル
            ctx.font = 'bold 14px Noto Sans JP';
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fillText('時間', width / 2 - 25, height / 2 + 35);
            ctx.fillText('分', width / 2 + 35, height / 2 + 35);
            
            // "日"
            ctx.font = 'bold 12px Noto Sans JP';
            ctx.fillText('日', width / 2, height / 2 - 40);
            
            ctx.restore();
        }
    };

    new Chart(ctxCircle, {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [75, 25],
                backgroundColor: ['#5EEAD4', 'rgba(255,255,255,0.1)'],
                borderWidth: 0,
                borderRadius: 10,
                cutout: '85%'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { enabled: false } }
        },
        plugins: [centerTextPlugin]
    });

    // --- 棒グラフ (Bar Chart) ---
    const ctxBar = document.getElementById('barChart').getContext('2d');
    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: ['月', '火', '水', '木', '金', '土', '日'],
            datasets: [{
                label: '学習分',
                data: [31, 32, 32, 31, 34, 38, 5],
                backgroundColor: (context) => {
                    const index = context.dataIndex;
                    return index === 6 ? '#5EEAD4' : 'rgba(94, 234, 212, 0.5)';
                },
                borderRadius: 4,
                barThickness: 12,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { display: false, max: 50 },
                x: {
                    grid: { display: false },
                    ticks: { color: 'rgba(255,255,255,0.7)', font: { size: 12, weight: 'bold' } },
                    border: { display: false }
                }
            },
            plugins: {
                legend: { display: false },
                // バーの上に数値を表示するカスタム
                afterDatasetsDraw: (chart) => {
                    const { ctx, data } = chart;
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 10px Inter';
                    chart.getDatasetMeta(0).data.forEach((bar, index) => {
                        ctx.fillText(data.datasets[0].data[index], bar.x, bar.y - 10);
                    });
                    ctx.restore();
                }
            }
        },
        // 外部プラグインとして数値を描画
        plugins: [{
            id: 'valueLabel',
            afterDatasetsDraw: (chart) => {
                const { ctx, data } = chart;
                ctx.save();
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = 'bold 11px Inter';
                chart.getDatasetMeta(0).data.forEach((bar, index) => {
                    ctx.fillText(data.datasets[0].data[index], bar.x, bar.y - 8);
                });
                ctx.restore();
            }
        }]
    });
</script>

</body>
</html>
